name: sonarr

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "8989:8989"
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      TZ: ${TZ:-UTC}
    volumes:
      - /mnt/user/appdata/mycelium-media-stack/sonarr:/config
