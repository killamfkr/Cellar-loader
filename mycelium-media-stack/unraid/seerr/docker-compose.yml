name: seerr

services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    networks:
      - mycelium-media
    ports:
      - "5055:5055"
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - /mnt/user/appdata/mycelium-media-stack/seerr:/app/config

networks:
  mycelium-media:
    external: true
