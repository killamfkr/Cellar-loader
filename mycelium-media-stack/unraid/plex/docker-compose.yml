name: plex-spore

services:
  plex:
    image: ghcr.io/killamfkr/plex-spore:latest
    container_name: plex
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "32400:32400"
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      TZ: ${TZ:-UTC}
      VERSION: docker
      PLEX_CLAIM: ""
      MYCELIUM_URL: http://192.168.1.50:8088
    volumes:
      - /mnt/user/appdata/mycelium-media-stack/plex:/config
      - /mnt/user/appdata/mycelium-media-stack/plex-media:/plex-media
