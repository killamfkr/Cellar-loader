name: prowlarr

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "9696:9696"
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      TZ: ${TZ:-UTC}
    volumes:
      - /mnt/user/appdata/mycelium-media-stack/prowlarr:/config
