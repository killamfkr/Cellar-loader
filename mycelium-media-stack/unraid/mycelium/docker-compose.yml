name: mycelium

services:
  mycelium:
    image: ghcr.io/corveck79/mycelium:latest
    container_name: mycelium
    restart: unless-stopped
    networks:
      - mycelium-media
    ports:
      - "8088:8088"
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      TZ: ${TZ:-UTC}
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 8088
      MEDIA_PATH: /data/media
      DB_PATH: /data/requests.db
      TORBOX_API_KEY: replace-me
      TMDB_API_KEY: replace-me
      CATBOX_MODE: "true"
      CATBOX_HOST: http://192.168.1.50:8088
      CATBOX_IDLE_MINUTES: "43200"
      SPORE_ENABLED: "true"
      SPORE_MEDIA_PATH: /data/plex-media
      WEBHOOK_SECRET: change-me
      SEERR_URL: http://seerr:5055
      SEERR_API_KEY: ""
    volumes:
      - /mnt/user/appdata/mycelium-media-stack/mycelium:/data
      - /mnt/user/appdata/mycelium-media-stack/plex-media:/data/plex-media
    devices:
      - /dev/dri:/dev/dri

networks:
  mycelium-media:
    external: true
