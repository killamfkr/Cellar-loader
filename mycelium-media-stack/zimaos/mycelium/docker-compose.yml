name: mycelium

services:
  mycelium:
    image: ghcr.io/corveck79/mycelium:latest
    container_name: mycelium
    restart: unless-stopped
    network_mode: bridge
    ports:
      - target: 8088
        published: "8088"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 8088
      MEDIA_PATH: /data/media
      DB_PATH: /data/requests.db
      TORBOX_API_KEY: $TORBOX_API_KEY
      TMDB_API_KEY: $TMDB_API_KEY
      CATBOX_MODE: "true"
      CATBOX_HOST: $CATBOX_HOST
      CATBOX_IDLE_MINUTES: "43200"
      SPORE_ENABLED: "true"
      SPORE_MEDIA_PATH: /data/plex-media
      WEBHOOK_SECRET: $WEBHOOK_SECRET
      SEERR_URL: $SEERR_URL
      SEERR_API_KEY: $SEERR_API_KEY
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/mycelium
        target: /data
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/plex-media
        target: /data/plex-media
    x-casaos:
      envs:
        - container: TORBOX_API_KEY
          description:
            en_us: TorBox API key from torbox.app Settings API page.
        - container: TMDB_API_KEY
          description:
            en_us: TMDB Read Access Token (starts with eyJ).
        - container: CATBOX_HOST
          description:
            en_us: Your ZimaOS LAN URL, e.g. http://192.168.1.50:8088
        - container: WEBHOOK_SECRET
          description:
            en_us: Random secret for Seerr webhooks.
        - container: SEERR_URL
          description:
            en_us: Seerr URL using your LAN IP, e.g. http://192.168.1.50:5055
        - container: SEERR_API_KEY
          description:
            en_us: Optional. Paste after Seerr setup.

x-casaos:
  app_id: com.cellarloader.mycelium
  main: mycelium
  author: Cellar-loader
  developer: corveck79
  category: Media
  description:
    en_us: TorBox library automation with Catbox lazy streaming and Spore Plex stubs.
  tagline:
    en_us: Mycelium TorBox media pipeline
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jellyfin/icon.svg
  index: /
  scheme: http
  port_map: "8088"
  store_app_id: mycelium
  tips:
    before_install:
      en_us: |
        Run prepare.sh once via SSH to create folders.
        Set CATBOX_HOST to http://YOUR-ZIMAOS-IP:8088 before installing.
  title:
    en_us: Mycelium
