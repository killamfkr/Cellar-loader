name: seerr

services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    network_mode: bridge
    ports:
      - target: 5055
        published: "5055"
        protocol: tcp
    environment:
      TZ: $TZ
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/seerr
        target: /app/config

x-casaos:
  app_id: com.cellarloader.seerr
  main: seerr
  author: Cellar-loader
  developer: Seerr Team
  category: Media
  description:
    en_us: Request UI for Plex. Use your LAN IP for service URLs during setup.
  tagline:
    en_us: Seerr for Mycelium stack
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Overseerr/icon.svg
  index: /
  scheme: http
  port_map: "5055"
  store_app_id: seerr
  tips:
    before_install:
      en_us: |
        Install Plex, Radarr, and Sonarr first.
        Webhook URL: http://YOUR-IP:8088/webhook?secret=YOUR_SECRET
        (secret from Mycelium Admin → Settings → Integration Endpoints)
  title:
    en_us: Seerr
