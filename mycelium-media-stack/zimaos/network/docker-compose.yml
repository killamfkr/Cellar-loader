name: mycelium-media-network

services:
  network-hold:
    image: alpine:3.20
    container_name: mycelium-media-network
    command: sleep infinity
    restart: unless-stopped
    networks:
      - mycelium-media

networks:
  mycelium-media:
    name: mycelium-media
    driver: bridge

x-casaos:
  app_id: com.cellarloader.mycelium-network
  main: network-hold
  author: Cellar-loader
  category: Network
  description:
    en_us: Shared Docker network for the Mycelium media stack. Install this first.
  tagline:
    en_us: Mycelium stack network
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Syncthing/icon.svg
  index: /
  scheme: http
  port_map: ""
  store_app_id: mycelium-media-network
  is_uncontrolled: true
  tips:
    before_install:
      en_us: |
        Install this **before** Mycelium, Plex, and the *arr apps.
        It creates the shared `mycelium-media` network so containers can reach each other by name.
        No configuration needed — just click Install.
  title:
    en_us: Mycelium Media Network
