name: plex-spore

services:
  plex:
    image: ghcr.io/killamfkr/plex-spore:latest
    container_name: plex
    restart: unless-stopped
    network_mode: bridge
    ports:
      - target: 32400
        published: "32400"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      VERSION: docker
      PLEX_CLAIM: $PLEX_CLAIM
      MYCELIUM_URL: $MYCELIUM_URL
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/plex
        target: /config
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/plex-media
        target: /plex-media
    x-casaos:
      envs:
        - container: PLEX_CLAIM
          description:
            en_us: Optional claim token from plex.tv/claim (expires in ~4 minutes).
        - container: MYCELIUM_URL
          description:
            en_us: Mycelium URL for Spore, e.g. http://192.168.1.50:8088

x-casaos:
  app_id: com.cellarloader.plex-spore
  main: plex
  author: Cellar-loader
  developer: LinuxServer.io
  category: Media
  description:
    en_us: Plex with Mycelium Spore transcoder wrapper pre-installed.
  tagline:
    en_us: Plex + Spore for Mycelium
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Plex/icon.svg
  index: /web
  scheme: http
  port_map: "32400"
  store_app_id: plex-spore
  tips:
    before_install:
      en_us: |
        Install Mycelium first.
        Set MYCELIUM_URL to http://YOUR-ZIMAOS-IP:8088
        Add Plex libraries at /plex-media/movies and /plex-media/tv after install.
  title:
    en_us: Plex Spore
