name: mycelium-media-stack

services:
  mycelium:
    image: ghcr.io/corveck79/mycelium:latest
    container_name: mycelium
    restart: unless-stopped
    ports:
      - target: 8088
        published: "8088"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 8088
      MEDIA_PATH: /data/media
      DB_PATH: /data/requests.db
      TORBOX_API_KEY: $TORBOX_API_KEY
      TMDB_API_KEY: $TMDB_API_KEY
      CATBOX_MODE: "true"
      CATBOX_HOST: $CATBOX_HOST
      CATBOX_IDLE_MINUTES: "43200"
      SPORE_ENABLED: "true"
      SPORE_MEDIA_PATH: /data/plex-media
      WEBHOOK_SECRET: $WEBHOOK_SECRET
      SEERR_URL: http://seerr:5055
      SEERR_API_KEY: $SEERR_API_KEY
      x-casaos:
        envs:
          - container: TORBOX_API_KEY
            description:
              en_us: TorBox API key from torbox.app → Settings → API (Essential or Pro plan).
          - container: TMDB_API_KEY
            description:
              en_us: TMDB Read Access Token (starts with eyJ) from themoviedb.org/settings/api.
          - container: CATBOX_HOST
            description:
              en_us: Your ZimaOS LAN URL for Mycelium, e.g. http://192.168.1.50:8088 (required for Catbox streaming).
          - container: WEBHOOK_SECRET
            description:
              en_us: Secret for Seerr webhooks. Use any random string; copy the same value into Seerr later.
          - container: SEERR_API_KEY
            description:
              en_us: Optional. Paste Seerr API key after Seerr setup (Settings → General).
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/mycelium
        target: /data
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/plex-media
        target: /data/plex-media
    devices:
      - /dev/dri:/dev/dri
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8088/health',timeout=5); sys.exit(0 if r.status==200 else 1)
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    depends_on:
      - mycelium
    ports:
      - target: 32400
        published: "32400"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      VERSION: docker
      PLEX_CLAIM: $PLEX_CLAIM
      x-casaos:
        envs:
          - container: PLEX_CLAIM
            description:
              en_us: Optional one-time claim token from plex.tv/claim (expires in ~4 minutes).
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /config/spore
        if [ ! -f /config/spore/plex_transcoder_wrapper.sh ]; then
          wget -qO /tmp/spore-wrap.sh https://raw.githubusercontent.com/corveck79/mycelium/main/spore/plex_transcoder_wrapper.sh
          sed 's|http://127.0.0.1:8088|http://mycelium:8088|g' /tmp/spore-wrap.sh > /config/spore/plex_transcoder_wrapper.sh
          chmod +x /config/spore/plex_transcoder_wrapper.sh
        fi
        if [ ! -f '/usr/lib/plexmediaserver/Plex Transcoder.real' ]; then
          mv '/usr/lib/plexmediaserver/Plex Transcoder' '/usr/lib/plexmediaserver/Plex Transcoder.real'
        fi
        cp /config/spore/plex_transcoder_wrapper.sh '/usr/lib/plexmediaserver/Plex Transcoder'
        chmod +x '/usr/lib/plexmediaserver/Plex Transcoder'
        exec /init
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/plex
        target: /config
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/plex-media
        target: /plex-media
        read_only: true

  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    restart: unless-stopped
    ports:
      - target: 8191
        published: "8191"
        protocol: tcp
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      TZ: $TZ

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    depends_on:
      - byparr
    ports:
      - target: 9696
        published: "9696"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/prowlarr
        target: /config

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - target: 7878
        published: "7878"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/radarr
        target: /config

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - target: 8989
        published: "8989"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/sonarr
        target: /config

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    depends_on:
      - plex
      - radarr
      - sonarr
    ports:
      - target: 5055
        published: "5055"
        protocol: tcp
    environment:
      TZ: $TZ
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/seerr
        target: /app/config

x-casaos:
  app_id: com.cellarloader.mycelium-media-stack
  architectures:
    - amd64
    - arm64
  main: mycelium
  author: Cellar-loader
  developer: corveck79 / LinuxServer.io / Seerr
  category: Media
  description:
    en_us: |
      TorBox-powered media stack with Mycelium (Catbox lazy streaming), Spore Plex integration,
      Plex, Seerr, Radarr, Sonarr, and Prowlarr. No local storage required for your library.
  tagline:
    en_us: Mycelium + Spore + Plex + *arr on ZimaOS
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jellyfin/icon.svg
  index: /
  scheme: http
  port_map: "8088"
  store_app_id: mycelium-media-stack
  is_uncontrolled: false
  tips:
    before_install:
      en_us: |
        **Before you install**

        1. You need a **TorBox** Essential or Pro account and API key.
        2. Get a free **TMDB Read Access Token** (starts with `eyJ`).
        3. Set **CATBOX_HOST** to your ZimaOS LAN address, e.g. `http://192.168.1.50:8088`.
        4. Set **WEBHOOK_SECRET** to any random string (used by Seerr later).
        5. After install, open Mycelium on port **8088** and finish the setup wizard.
        6. Spore for Plex is experimental — Linux/desktop Plex clients work best.

        **Service ports:** Mycelium 8088 · Plex 32400 · Seerr 5055 · Radarr 7878 · Sonarr 8989 · Prowlarr 9696

        See the full guide: github.com/killamfkr/Cellar-loader → mycelium-media-stack/zimaos/INSTALL.md
  title:
    en_us: Mycelium Media Stack
    custom: Mycelium Media Stack
