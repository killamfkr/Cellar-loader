name: sonarr

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: bridge
    ports:
      - target: 8989
        published: "8989"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium-media-stack/sonarr
        target: /config

x-casaos:
  app_id: com.cellarloader.sonarr
  main: sonarr
  author: Cellar-loader
  developer: LinuxServer.io
  category: Media
  description:
    en_us: TV list manager for bulk import into Mycelium.
  tagline:
    en_us: Sonarr for Mycelium stack
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Sonarr/icon.svg
  index: /
  scheme: http
  port_map: "8989"
  store_app_id: sonarr
  title:
    en_us: Sonarr
