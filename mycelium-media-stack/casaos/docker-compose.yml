name: mycelium

services:
  mycelium:
    image: ghcr.io/corveck79/mycelium:latest
    container_name: mycelium
    restart: unless-stopped
    network_mode: bridge
    ports:
      - target: 8088
        published: "8088"
        protocol: tcp
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 8088
      DB_PATH: /data/requests.db
      MEDIA_PATH: /data/media
      TORBOX_API_KEY: $TORBOX_API_KEY
      TORBOX_BASE_URL: https://api.torbox.app/v1/api
      TMDB_API_KEY: $TMDB_API_KEY
      ZILEAN_ENABLED: "false"
      CATBOX_MODE: "true"
      CATBOX_HOST: $CATBOX_HOST
      CATBOX_IDLE_MINUTES: "43200"
      CATBOX_LAZY_ADD: "true"
      WEBHOOK_SECRET: $WEBHOOK_SECRET
      JELLYFIN_URL: $JELLYFIN_URL
      JELLYFIN_API_KEY: $JELLYFIN_API_KEY
      SEERR_URL: $SEERR_URL
      SEERR_API_KEY: $SEERR_API_KEY
      QUALITY_PREFERENCE: 1080p,2160p,720p
      ALLOW_4K: "true"
      EXCLUDE_REMUX: "true"
      EXCLUDE_CAM: "true"
      PREFER_WEBDL: "true"
      PREFER_HEVC: "true"
      MIN_SEEDERS: "3"
      AUTO_UPGRADE_ENABLED: "true"
      LOG_LEVEL: INFO
    volumes:
      - type: bind
        source: /DATA/AppData/mycelium
        target: /data
      - type: bind
        source: /DATA/Media/mycelium
        target: /data/media
    x-casaos:
      envs:
        - container: TORBOX_API_KEY
          description:
            en_us: TorBox API key from torbox.app Settings API (Essential or Pro plan).
        - container: TMDB_API_KEY
          description:
            en_us: TMDB Read Access Token from themoviedb.org/settings/api (starts with eyJ).
        - container: CATBOX_HOST
          description:
            en_us: Your NAS LAN URL for streaming proxy, e.g. http://192.168.1.50:8088
        - container: WEBHOOK_SECRET
          description:
            en_us: Optional random secret if using Seerr webhooks (header X-Webhook-Secret).
        - container: JELLYFIN_URL
          description:
            en_us: Optional Jellyfin URL, e.g. http://192.168.1.50:8096
        - container: JELLYFIN_API_KEY
          description:
            en_us: Optional Jellyfin API key (Administration - API Keys).
        - container: SEERR_URL
          description:
            en_us: Optional Seerr URL, e.g. http://192.168.1.50:5055
        - container: SEERR_API_KEY
          description:
            en_us: Optional Seerr API key (Settings - General).
      ports:
        - container: "8088"
          description:
            en_us: Mycelium web UI and setup wizard.
      volumes:
        - container: /data
          description:
            en_us: Mycelium database and config (AppData).
        - container: /data/media
          description:
            en_us: Library folder with .strm files — point Jellyfin here.

x-casaos:
  app_id: com.corveck79.mycelium
  architectures:
    - amd64
    - arm64
  main: mycelium
  author: corveck79
  developer: corveck79
  category: Media
  description:
    en_us: |
      Mycelium turns TorBox into a self-hosted media library. Browse TMDB, request
      movies and shows, and stream via Jellyfin .strm files with Catbox lazy caching.
      No local downloads. Setup wizard at first launch.
  tagline:
    en_us: TorBox to Jellyfin — one container, zero storage
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jellyfin/icon.svg
  index: /
  scheme: http
  port_map: "8088"
  store_app_id: mycelium
  tips:
    before_install:
      en_us: |
        **Required before install**

        1. TorBox API key — torbox.app → Settings → API
        2. TMDB Read Access Token — themoviedb.org/settings/api (starts with `eyJ`)
        3. **CATBOX_HOST** — your NAS LAN IP, e.g. `http://192.168.1.50:8088`

        **Folders** (create via SSH if needed):
        ```
        mkdir -p /DATA/AppData/mycelium /DATA/Media/mycelium
        ```

        **After install:** open port 8088 and complete the setup wizard.
        Point Jellyfin libraries at `/data/media` inside the container
        (host path `/DATA/Media/mycelium`).

        Optional: Jellyfin and Seerr URLs use your **LAN IP**, not localhost.
  title:
    en_us: Mycelium
